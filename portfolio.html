<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portfolio | Layna's Hair Salon</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #f9f5f2, #e8d7c7);
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: "Poppins", sans-serif;
      color: #222;
      flex-direction: column;
      padding: 40px;
    }

    .container {
      background: #fff;
      padding: 50px;
      border-radius: 30px;
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.1);
      text-align: center;
      width: 100%;
      max-width: 800px;
    }

    h1 {
      font-size: 2.5rem;
      font-weight: 600;
      margin-bottom: 30px;
      color: #2b2b2b;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
    }

    .placeholder {
      background-color: #ddd;
      border-radius: 10px;
      height: 180px;
    }

    .button {
      margin-top: 30px;
      padding: 14px 36px;
      font-size: 1rem;
      background-color: #111;
      color: white;
      border: none;
      border-radius: 50px;
      cursor: pointer;
    }

    .button:hover {
      background-color: #444;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Portfolio</h1>
    <div class="gallery">
      <div class="placeholder"></div>
      <div class="placeholder"></div>
      <div class="placeholder"></div>
      <div class="placeholder"></div>
    </div>
    <button class="button" onclick="window.location.href='index.html'">← Back to Home</button>
  </div>
</body>
</html>
