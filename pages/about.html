<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>About | Layna's Hair Salon</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .about-wrap {
      display: grid;
      grid-template-columns: 1fr 1fr;
      min-height: calc(100vh - 72px);
      margin-top: 72px;
    }

    .about-image {
      position: relative;
      overflow: hidden;
    }

    .about-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: brightness(0.75);
      display: block;
    }

    .about-content {
      padding: 80px 64px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      border-left: 1px solid var(--border);
    }

    .about-eyebrow {
      font-size: 0.6rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 24px;
    }

    .about-name {
      font-family: var(--font-display);
      font-size: clamp(2.5rem, 4vw, 5rem);
      font-weight: 300;
      letter-spacing: 0.06em;
      line-height: 1.1;
      margin-bottom: 36px;
    }

    .about-name em {
      font-style: italic;
      color: var(--accent);
    }

    .about-body {
      font-size: 0.75rem;
      line-height: 2;
      color: var(--muted);
      max-width: 420px;
      margin-bottom: 48px;
    }

    .about-stats {
      display: flex;
      gap: 48px;
      margin-bottom: 48px;
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      padding: 28px 0;
    }

    .stat-num {
      font-family: var(--font-display);
      font-size: 2.8rem;
      font-weight: 300;
      color: var(--text);
      display: block;
      line-height: 1;
    }

    .stat-label {
      font-size: 0.55rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
      margin-top: 6px;
      display: block;
    }

    @media (max-width: 768px) {
      .about-wrap { grid-template-columns: 1fr; }
      .about-image { height: 50vw; }
      .about-content { padding: 48px 24px; border-left: none; border-top: 1px solid var(--border); }
      .about-stats { gap: 24px; }
    }
  </style>
</head>
<body>
  <nav>
    <a href="index.html" class="logo">Layna's Hair Salon</a>
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="about.html" class="active">About</a></li>
      <li><a href="portfolio.html">Portfolio</a></li>
      <li><a href="book-online.html" class="nav-cta">Book Now</a></li>
    </ul>
  </nav>

  <div class="about-wrap">
    <div class="about-image">
      <img src="../images/style4.jpeg" alt="Layna" />
    </div>
    <div class="about-content">
      <span class="about-eyebrow">The Stylist</span>
      <h1 class="about-name">Meet<br><em>Layna</em></h1>
      <p class="about-body">
        i will get u right ong
      </p>
      <div class="about-stats">
        <div>
          <span class="stat-num">3+</span>
          <span class="stat-label">Years Experience</span>
        </div>
        <div>
          <span class="stat-num">500+</span>
          <span class="stat-label">Clients Served</span>
        </div>
        <div>
          <span class="stat-num">100%</span>
          <span class="stat-label">On That</span>
        </div>
      </div>
      <a href="book-online.html" class="btn btn-filled" style="align-self:flex-start;">Book an Appointment</a>
    </div>
  </div>

  <footer>© 2025 Layna's Hair Salon</footer>
</body>
</html>
