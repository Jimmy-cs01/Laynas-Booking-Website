<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portfolio | Beauty by Layna</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .gallery-grid {
      padding: 0 2px 80px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 2px;
    }

    .gallery-grid img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
      aspect-ratio: 3 / 4;
      filter: brightness(0.88);
      transition: filter 0.4s ease, transform 0.4s ease;
      cursor: zoom-in;
    }

    .gallery-grid img:hover {
      filter: brightness(1);
      transform: scale(1.01);
      z-index: 1;
      position: relative;
    }

    /* Lightbox */
    .lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.92);
      z-index: 999;
      align-items: center;
      justify-content: center;
    }

    .lightbox.active { display: flex; }

    .lightbox img {
      max-width: 90vw;
      max-height: 90vh;
      object-fit: contain;
      border: 1px solid var(--border);
    }

    .lightbox-close {
      position: fixed;
      top: 24px;
      right: 32px;
      font-size: 0.6rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      cursor: pointer;
      background: none;
      border: none;
      transition: color 0.2s;
    }

    .lightbox-close:hover { color: var(--text); }

    @media (max-width: 768px) {
      .gallery-grid { grid-template-columns: repeat(2, 1fr); }
    }

    @media (max-width: 480px) {
      .gallery-grid { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>
  <nav>
    <a href="index.html" class="logo">Beauty by Layna</a>
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="portfolio.html" class="active">Portfolio</a></li>
      <li><a href="book-online.html" class="nav-cta">Book Now</a></li>
    </ul>
    <button class="hamburger" id="hamburger" aria-label="Menu">
      <span></span><span></span><span></span>
    </button>
  </nav>

  <div class="page-header">
    <h1>Portfolio</h1>
    <p>Transformations &amp; looks</p>
    <div class="accent-line"></div>
  </div>

  <div class="gallery-grid" id="gallery"></div>

  <script>
    // ── CONFIG: bump this number whenever you add more images ──
    const TOTAL_IMAGES = 30;
    const IMAGE_DIR = 'images/';
    // ──────────────────────────────────────────────────────────

    const gallery = document.getElementById('gallery');

    for (let i = 1; i <= TOTAL_IMAGES; i++) {
      const img = document.createElement('img');
      img.src = `${IMAGE_DIR}style${i}.jpeg`;
      img.alt = `Hairstyle ${i}`;
      img.loading = 'lazy';
      // silently drop any missing images so gaps don't appear
      img.onerror = function() { this.remove(); };
      img.addEventListener('click', () => {
        lbImg.src = img.src;
        lbImg.alt = img.alt;
        lb.classList.add('active');
      });
      gallery.appendChild(img);
    }
  </script>

  <!-- Lightbox -->
  <div class="lightbox" id="lightbox">
    <button class="lightbox-close" id="lb-close">Close ✕</button>
    <img src="" id="lb-img" alt="" />
  </div>

  <footer>© 2025 Beauty by Layna</footer>

  <script>
    const lb = document.getElementById('lightbox');
    const lbImg = document.getElementById('lb-img');
    const lbClose = document.getElementById('lb-close');

    lbClose.addEventListener('click', () => lb.classList.remove('active'));
    lb.addEventListener('click', e => { if (e.target === lb) lb.classList.remove('active'); });
    document.addEventListener('keydown', e => { if (e.key === 'Escape') lb.classList.remove('active'); });
  </script>
  <script>
    const hamburger = document.getElementById('hamburger');
    const navUl = document.querySelector('nav ul');
    hamburger.addEventListener('click', () => {
      hamburger.classList.toggle('open');
      navUl.classList.toggle('open');
    });
    navUl.querySelectorAll('a').forEach(a => {
      a.addEventListener('click', () => {
        hamburger.classList.remove('open');
        navUl.classList.remove('open');
      });
    });
  </script>
</body>
</html>
