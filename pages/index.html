<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Layna's Hair Salon</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: "Poppins", sans-serif;
      color: #222;
      background: #fdfaf7;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    /* Navigation Bar */
    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background-color: #2b2b2b;
      color: white;
      padding: 15px 50px;
    }

    nav h1 {
      font-size: 1.5rem;
      font-weight: 600;
    }

    nav ul {
      list-style: none;
      display: flex;
      gap: 25px;
    }

    nav ul li a {
      color: white;
      text-decoration: none;
      font-weight: 500;
      transition: color 0.3s ease;
    }

    nav ul li a:hover {
      color: #f0c8a0;
    }

    /* Header Section: Title + Image Side-by-Side */
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: linear-gradient(135deg, #f9f5f2, #e8d7c7);
      padding: 60px 8%;
      flex-wrap: wrap;
    }

    .header-text {
      flex: 1;
      min-width: 250px;
    }

    .header-text h2 {
      font-size: 3rem;
      color: #2b2b2b;
      margin-bottom: 15px;
    }

    .header-text p {
      font-size: 1.2rem;
      color: #555;
      max-width: 400px;
      line-height: 1.7;
    }

    .header-image {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .header-image img {
      width: 100%;
      max-width: 400px;
      border-radius: 20px;
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.1);
    }

    /* Mission Statement */
.mission {
  max-width: 800px;
  margin: 60px auto;
  text-align: center;
  padding: 0 20px;
  background: none; /* no white box */
  box-shadow: none;
}

.button-container {
  display: flex;
  justify-content: center;
  gap: 25px;
  margin: 50px 0;
  flex-wrap: wrap;
  background: none; /* keep transparent */
}

    .mission h3 {
      font-size: 2rem;
      margin-bottom: 20px;
      color: #2b2b2b;
    }

    .mission p {
      font-size: 1.1rem;
      line-height: 1.8;
      color: #444;
    }

    /* Buttons */
    .button-container {
      display: flex;
      justify-content: center;
      gap: 25px;
      margin: 50px 0;
      flex-wrap: wrap;
    }

    .button {
      padding: 14px 36px;
      font-size: 1.1rem;
      background-color: #2b2b2b;
      color: white;
      border: none;
      border-radius: 30px;
      cursor: pointer;
      transition: background 0.3s ease;
    }

    .button:hover {
      background-color: #555;
    }

    footer {
      text-align: center;
      padding: 20px 0;
      color: #555;
      background-color: #f3e9e1;
      font-size: 0.9rem;
      margin-top: auto;
    }

    @media (max-width: 768px) {
      header {
        flex-direction: column;
        text-align: center;
      }

      .header-text h2 {
        font-size: 2.2rem;
      }

      .header-image img {
        margin-top: 25px;
        max-width: 300px;
      }

      .button-container {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <nav>
    <h1>Layna's Hair Salon</h1>x
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="book-online.html">Book Online</a></li>
      <li><a href="about.html">About Me</a></li>
      <li><a href="portfolio.html">Portfolio</a></li>
    </ul>
  </nav>

  <header>
    <div class="header-text">
      <h2>Layna’s Hair Salon</h2>
      <p>I'll get u right ong.</p>
    </div>
    <div class="header-image">
      <img src="../images/style5.jpeg" alt="Salon Style">
    </div>
  </header>

  <section class="mission">
    <h3>Our Mission</h3>
    <p>blah blah </p>
  </section>

  <div class="button-container">
    <button class="button" onclick="window.location.href='book-online.html'">Book Online</button>
    <button class="button" onclick="window.location.href='about.html'">About Me</button>
    <button class="button" onclick="window.location.href='portfolio.html'">Portfolio</button>
  </div>

  <footer>© 2025 Layna's Hair Salon</footer>
</body>
</html>
