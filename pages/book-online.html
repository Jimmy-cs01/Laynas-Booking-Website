<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Book Online | Beauty by Layna</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .booking-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 140px 24px 80px;
    }

    .booking-card {
      width: 100%;
      max-width: 520px;
    }

    .booking-eyebrow {
      font-size: 0.6rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--accent);
      display: block;
      margin-bottom: 20px;
    }

    .booking-title {
      font-family: var(--font-display);
      font-size: clamp(2.5rem, 5vw, 4.5rem);
      font-weight: 300;
      letter-spacing: 0.05em;
      line-height: 1.1;
      margin-bottom: 16px;
    }

    .booking-sub {
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      color: var(--muted);
      line-height: 1.9;
      margin-bottom: 52px;
    }

    .square-wrap {
      filter: invert(1) hue-rotate(180deg);
      border-radius: 4px;
      overflow: hidden;
      margin-bottom: 32px;
    }

    /* Re-invert any images/logos inside so they don't look wrong */
    .square-wrap img {
      filter: invert(1) hue-rotate(180deg);
    }

    .service-list {
      display: flex;
      flex-direction: column;
      gap: 2px;
      margin-bottom: 32px;
    }

    .service-btn {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 22px 28px;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: var(--font-body);
      font-size: 0.6rem;
      font-weight: 500;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.25s, border-color 0.25s;
    }

    .service-btn:hover {
      background: var(--surface2);
      border-color: var(--accent);
    }

    .service-btn .arrow {
      color: var(--accent);
      font-size: 0.8rem;
      transition: transform 0.2s;
    }

    .service-btn:hover .arrow { transform: translateX(4px); }

    .back-link {
      display: inline-block;
      font-size: 0.6rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.2s;
    }

    .back-link:hover { color: var(--text); }
  </style>
</head>
<body>
  <nav>
    <a href="index.html" class="logo">Beauty by Layna</a>
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="portfolio.html">Portfolio</a></li>
      <li><a href="book-online.html" class="nav-cta active">Book Now</a></li>
    </ul>
    <button class="hamburger" id="hamburger" aria-label="Menu">
      <span></span><span></span><span></span>
    </button>
  </nav>

  <div class="booking-wrap">
    <div class="booking-card">
      <span class="booking-eyebrow">Reserve Your Spot</span>
      <h1 class="booking-title">Book an<br>Appointment</h1>
      <p class="booking-sub">Reserve your spot and pay securely online or in person.</p>

      <div class="square-wrap">
        <!-- Start Square Appointments Embed Code -->
        <script src='https://square.site/appointments/buyer/widget/f5x6idu4mt4ehm/LBKGD7WKE51YD.js'></script>
        <!-- End Square Appointments Embed Code -->
      </div>

      <a href="index.html" class="back-link">← Back to Home</a>
    </div>
  </div>

  <footer>© 2025 Beauty by Layna</footer>
  <script>
    const hamburger = document.getElementById('hamburger');
    const navUl = document.querySelector('nav ul');
    hamburger.addEventListener('click', () => {
      hamburger.classList.toggle('open');
      navUl.classList.toggle('open');
    });
    // close when a link is clicked
    navUl.querySelectorAll('a').forEach(a => {
      a.addEventListener('click', () => {
        hamburger.classList.remove('open');
        navUl.classList.remove('open');
      });
    });
  </script>
</body>
</html>
