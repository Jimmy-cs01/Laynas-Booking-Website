<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>About Me | Layna's Hair Salon</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: "Poppins", sans-serif;
      color: #222;
      /* unified gradient for full page */
      background: linear-gradient(135deg, #f6f0ea, #e8d4c4);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Navigation Bar */
    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background-color: #2b2b2b;
      color: white;
      padding: 15px 50px;
    }

    nav h1 {
      font-size: 1.5rem;
      font-weight: 600;
    }

    nav ul {
      list-style: none;
      display: flex;
      gap: 25px;
    }

    nav ul li a {
      color: white;
      text-decoration: none;
      font-weight: 500;
      transition: color 0.3s ease;
    }

    nav ul li a:hover {
      color: #f0c8a0;
    }

    /* Header Section */
    header {
      text-align: center;
      padding: 80px 20px 30px;
      background: transparent; /* remove separate background */
    }

    header h2 {
      font-size: 2.8rem;
      color: #2b2b2b;
      margin-bottom: 10px;
    }

    header p {
      font-size: 1.2rem;
      color: #555;
      max-width: 700px;
      margin: 0 auto;
    }

    /* Content Container */
    .container {
      background: #fff;
      padding: 50px;
      border-radius: 30px;
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.1);
      text-align: center;
      width: 90%;
      max-width: 600px;
      margin: 60px auto;
    }

    h3 {
      font-size: 2rem;
      font-weight: 600;
      margin-bottom: 20px;
      color: #2b2b2b;
    }

    p {
      font-size: 1.1rem;
      color: #444;
      line-height: 1.7;
      margin-bottom: 35px;
    }

    .button {
      padding: 14px 36px;
      font-size: 1rem;
      background-color: #2b2b2b;
      color: white;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      transition: background 0.3s ease;
    }

    .button:hover {
      background-color: #555;
    }

    footer {
      text-align: center;
      padding: 20px 0;
      color: #555;
      background: transparent; /* match gradient */
      font-size: 0.9rem;
      margin-top: auto;
    }

    @media (max-width: 600px) {
      nav {
        flex-direction: column;
        gap: 10px;
      }

      header h2 {
        font-size: 2rem;
      }
    }
  </style>
</head>
<body>
  <nav>
    <h1>Layna's Hair Salon</h1>
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="book-online.html">Book Online</a></li>
      <li><a href="about.html">About Me</a></li>
      <li><a href="portfolio.html">Portfolio</a></li>
    </ul>
  </nav>

  <header>
    <h2>About Me</h2>
    <p>blah blah title stuff</p>
  </header>

  <div class="container">
    <h3>Meet Layna</h3>
    <p>i will get u right ong</p>
    <button class="button" onclick="window.location.href='index.html'">← Back to Home</button>
  </div>

  <footer>© 2025 Layna's Hair Salon</footer>
</body>
</html>
