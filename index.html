<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Laynas Salon</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      height: 100vh;
      background: linear-gradient(135deg, #f0ebe6, #e5d4c0);
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: "Poppins", sans-serif;
      color: #222;
    }

    .hero {
      text-align: center;
      animation: fadeIn 1.5s ease;
    }

    .hero h1 {
      font-size: 3rem;
      font-weight: 600;
      margin-bottom: 30px;
      color: #2b2b2b;
      letter-spacing: 1px;
    }

    .button {
      padding: 18px 48px;
      font-size: 1.2rem;
      background-color: #111;
      color: white;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 6px 14px rgba(0, 0, 0, 0.1);
    }

    .button:hover {
      background-color: #444;
      transform: translateY(-2px);
      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.2);
    }

  </style>
</head>
<body>
  <div class="hero">
    <h1>Layna's Hair Salon</h1>
    <button class="button" onclick="window.location.href='booking.html'">Book a Haircut</button>
  </div>
</body>
</html>
