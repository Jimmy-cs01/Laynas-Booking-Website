<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Layna's Hair Salon</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      height: 100vh;
      background: linear-gradient(135deg, #f9f5f2, #e8d7c7);
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: "Poppins", sans-serif;
      color: #222;
    }

    .hero {
      text-align: center;
      max-width: 500px;
    }

    .hero h1 {
      font-size: 3rem;
      font-weight: 600;
      margin-bottom: 40px;
      color: #2b2b2b;
    }

    .button-container {
      display: flex;
      flex-direction: column;
      gap: 20px;
      align-items: center;
    }

    .button {
      padding: 16px 42px;
      font-size: 1.2rem;
      background-color: #111;
      color: white;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      width: 240px;
    }

    .button:hover {
      background-color: #444;
    }

    footer {
      position: absolute;
      bottom: 20px;
      font-size: 0.9rem;
      color: #555;
    }
  </style>
</head>
<body>
  <div class="hero">
    <h1>Layna's Hair Salon</h1>
    <div class="button-container">
      <button class="button" onclick="window.location.href='book-online.html'">Book Online</button>
      <button class="button" onclick="window.location.href='about.html'">About Me</button>
      <button class="button" onclick="window.location.href='portfolio.html'">Portfolio</button>
    </div>
  </div>
  <footer>© 2025 Layna's Hair Salon</footer>
</body>
</html>
