<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Book Online | Layna's Hair Salon</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    

    body {
      font-family: "Poppins", sans-serif;
      color: #222;
      background: #fdfaf7;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    /* Navigation Bar */
    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background-color: #2b2b2b;
      color: white;
      padding: 15px 50px;
    }

    nav h1 {
      font-size: 1.5rem;
      font-weight: 600;
    }

    nav ul {
      list-style: none;
      display: flex;
      gap: 25px;
    }

    nav ul li a {
      color: white;
      text-decoration: none;
      font-weight: 500;
      transition: color 0.3s ease;
    }

    nav ul li a:hover {
      color: #f0c8a0;
    }

    /* Header Section */
    header {
      text-align: center;
      padding: 80px 20px 30px;
      background: linear-gradient(135deg, #f9f5f2, #e8d7c7);
    }

    header h2 {
      font-size: 2.8rem;
      color: #2b2b2b;
      margin-bottom: 10px;
    }

    header p {
      font-size: 1.2rem;
      color: #555;
      max-width: 700px;
      margin: 0 auto;
    }

    /* Booking Container */
    .container {
      background: #fff;
      padding: 50px 40px 40px;
      border-radius: 30px;
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.1);
      text-align: center;
      width: 90%;
      max-width: 600px;
      margin: 50px auto;
      flex: 1;
    }

    .button-container {
      display: flex;
      flex-direction: column;
      gap: 20px;
      align-items: center;
      margin-bottom: 10px; /* tightened bottom space */
    }

    .button {
      padding: 16px 42px;
      font-size: 1.1rem;
      background-color: #2b2b2b;
      color: white;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      width: 240px;
      transition: background 0.3s ease;
    }

    .button:hover {
      background-color: #555;
    }

    .back {
      margin-top: 15px;
      background: white;
      color: #333;
      border: 2px solid #333;
      width: 240px;
    }

    .back:hover {
      background: #333;
      color: white;
    }

    footer {
      text-align: center;
      padding: 20px 0;
      color: #555;
      background-color: #f3e9e1;
      font-size: 0.9rem;
    }

    @media (max-width: 600px) {
      nav {
        flex-direction: column;
        gap: 10px;
      }

      header h2 {
        font-size: 2rem;
      }
    }
  </style>
</head>
<body>
  <nav>
    <h1>Layna's Hair Salon</h1>
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="book-online.html">Book Online</a></li>
      <li><a href="about.html">About Me</a></li>
      <li><a href="portfolio.html">Portfolio</a></li>
    </ul>
  </nav>

  <header>
    <h2>Book an Appointment</h2>
    <p>Reserve your spot for a fresh new look with quick, easy online booking — no payment required.</p>
  </header>

  <div class="container">
    <div class="button-container">
      <button class="button" onclick="window.location.href='booking-haircut.html'">Haircut</button>
      <button class="button" onclick="window.location.href='booking-color.html'">Hair Coloring</button>
      <button class="button" onclick="window.location.href='booking-styling.html'">Styling Session</button>
    </div>
    <button class="button back" onclick="window.location.href='index.html'">← Back to Home</button>
  </div>

  <footer>© 2025 Layna's Hair Salon</footer>
</body>
</html>
