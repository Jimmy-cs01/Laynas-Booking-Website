<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Book Online | Layna's Hair Salon</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      height: 100vh;
      background: linear-gradient(135deg, #f0ebe6, #e5d4c0);
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: "Poppins", sans-serif;
      color: #222;
    }

    .container {
      background: #fff;
      padding: 50px;
      border-radius: 30px;
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.1);
      text-align: center;
      width: 90%;
      max-width: 500px;
    }

    h1 {
      font-size: 2.5rem;
      font-weight: 600;
      margin-bottom: 30px;
      color: #2b2b2b;
    }

    .button-container {
      display: flex;
      flex-direction: column;
      gap: 20px;
      align-items: center;
    }

    .button {
      padding: 16px 42px;
      font-size: 1.1rem;
      background-color: #111;
      color: white;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      width: 240px;
    }

    .button:hover {
      background-color: #444;
    }

    .back {
      margin-top: 25px;
      background: white;
      color: #333;
      border: 2px solid #333;
    }

    .back:hover {
      background: #333;
      color: white;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Book an Appointment</h1>
    <div class="button-container">
      <button class="button" onclick="window.location.href='booking-haircut.html'">Haircut</button>
      <button class="button" onclick="window.location.href='booking-color.html'">Hair Coloring</button>
      <button class="button" onclick="window.location.href='booking-styling.html'">Styling Session</button>
    </div>
    <button class="button back" onclick="window.location.href='index.html'">← Back to Home</button>
  </div>
</body>
</html>
